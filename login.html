<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="logo-area">
                <img src="img_login.png" alt="imagem login">
                <h1>Faça seu login</h1>
                <p>Bem - Vindo de volta</p>
            </div>

            <div id="erro-login" style="color: #ff3333; font-weight: bold; margin-bottom: 15px; display: none;">
                Informações incorretas. Tente novamente.
            </div>

            <form>
                <div class="input-group">
                    <input type="email" placeholder="E-mail" required>
                    <input type="text" placeholder="Senha" required>
                </div>

                <a href="transacoes" style="text-decoration: none; width: 100%;">
                    <button id="btn-entrar" type="button">CADASTRAR</button>
                </a>                
            </form>

            <div class="footer-link">
                Não tem uma conta? <a href="cadastro.html">Faça seu cadastro</a>
            </div>
        </div>
    </div>
    

    <script>
        document.getElementById('btn-entrar').addEventListener('click', function(event) {
            event.preventDefault(); 
            
            document.getElementById('erro-login').style.display = 'block';
            
            setTimeout(function() {
                window.location.href = "transacoes";
            }, 2000);
        });
    </script>
</body>
</html>
